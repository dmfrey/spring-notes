server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy OTLP traces to Alloy
    location /otlp/ {
        proxy_pass http://alloy.observability.svc.cluster.local:4318/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback — all unmatched paths serve index.html
    # /api/* routing is handled upstream by Envoy, not here
    location / {
        try_files $uri $uri/ /index.html;
    }
}