name: OpenRewrite

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'  # Mondays at 08:00 UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rewrite:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run OpenRewrite
        run: ./gradlew rewriteRun

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: apply OpenRewrite Spring recipes'
          branch: openrewrite/automated-spring-recipes
          delete-branch: true
          title: 'chore: OpenRewrite automated Spring recipe suggestions'
          body: |
            ## OpenRewrite automated changes

            This PR was created automatically by the [OpenRewrite](https://docs.openrewrite.org/) workflow.

            ### Active recipes
            - `SpringBoot33BestPractices` — enforces idiomatic Spring Boot 3/4 code patterns
            - `NoAutowiredOnConstructor` — removes redundant `@Autowired` on single constructors

            ### Review guidance
            - Each commit corresponds to one recipe's changes
            - Changes are purely mechanical; no logic is altered
            - Review, adjust if needed, then merge to apply

            ---
            *Generated by `./gradlew rewriteRun` — [OpenRewrite docs](https://docs.openrewrite.org/)*
          labels: dependencies,automated