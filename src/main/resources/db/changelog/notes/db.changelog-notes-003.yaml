databaseChangeLog:
  - changeSet:
      id: notes-003-add-auditing-columns
      author: dmfrey
      changes:
        - addColumn:
            tableName: notes
            columns:
              - column:
                  name: created_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: true
              - column:
                  name: last_modified_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: true
              - column:
                  name: created_by
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: last_modified_by
                  type: VARCHAR(255)
                  constraints:
                    nullable: true